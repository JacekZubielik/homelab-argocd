---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: route53-issuer-staging
  #name: cert-manager-acme-issuer-staging
  namespace: cert-manager
  # annotations:
  #   argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  acme:
    email: zumbik@protonmail.com
    privateKeySecretRef:
      name: route53-access-key
      #name: cert-manager-acme-private-key
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    solvers:
    - dns01:
        route53:
          accessKeyID: AKIATKAIYFFV34T22QYU
          region: eu-central-1
          hostedZoneID: Z08398941B204TVG99U4E
          role: arn:aws:iam::227651627371:user/certManagerIAMUser
          secretAccessKeySecretRef:
            name: route53-credentials-secret
            key: secret-access-key
            #name: cert-manager-aws-secret
