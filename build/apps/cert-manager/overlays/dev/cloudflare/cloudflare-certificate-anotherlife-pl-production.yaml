---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cloudflare-certificate-anotherlife-pl-production
  namespace: cert-manager
spec:
  dnsNames:
  - anotherlife.pl
  - '*.anotherlife.pl'
  issuerRef:
    kind: ClusterIssuer
    name: cloudflare-issuer-production
  secretName: cloudflare-certificate-anotherlife-pl-tls-production
  duration: 2160h0m0s # 90d(if use helm chart 2160h0m0s)
  renewBefore: 720h0m0s # 30d(if use helm chart 720h0m0s)